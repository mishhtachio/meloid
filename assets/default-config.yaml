# | '_ ` _ \ / _ \ |/ _ \| |/ _` |
# | | | | | |  __/ | (_) | | (_| |
# |_| |_| |_|\___|_|\___/|_|\__,_|
#
#
# This is the configuration file for meloid.
# The default configuration is automatically generated by meloid.

$schema: https://github.com/DexerMatters/meloid/raw/master/assets/config.schema.yaml

# Welcome message
#
# It is displayed when meloid starts
showWelcome: true

# Color mode
#
# - auto: automatically detect the color mode
# - light: force light mode
# - dark: force dark mode
colorMode: auto

# Equalizer configuration
#
# You can check all the available profiles at ./eq/*.txt or on the equalizer
# panel in the application
eq: default

# Layout
#
# Available layout elements:
# - albumList
# - albumSongList
# - playingQueue
#
# Optional weights can be specified as the first item of an hBox/vBox:
# hBox:
#   - weights: [2, 3]
#   - albumList
#   - playingQueue
layout:
  hBox:
    - weights: [2, 3]
    - albumList
    - vBox:
        - weights: [1, 1]
        - albumSongList
        - playingQueue
